<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Diary</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/family-tree.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 font-sans pb-20">

    <header class="bg-blue-700 text-white p-4 sticky top-0 z-10 shadow-lg">
        <h1 class="text-xl font-bold text-center italic">Family Diary</h1>
        <input type="text" id="searchInput" placeholder="Search Name, Sub-Family, Place..." 
               class="w-full mt-3 p-3 rounded-lg text-black focus:ring-2 focus:ring-yellow-400 outline-none shadow-inner">
    </header>

    <div class="p-4 flex gap-3">
        <button onclick="openModal()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold shadow-md active:scale-95 transition-transform">+ Add New</button>
        <button onclick="exportToExcel()" class="flex-1 bg-slate-700 text-white py-3 rounded-lg font-bold shadow-md">📥 Download Excel</button>
    </div>

    <div id="contactList" class="p-4 space-y-4">
        <p class="text-center text-gray-400 mt-10 italic">Connecting to Cloud Firestore...</p>
    </div>

    <datalist id="familySuggestions"></datalist>
    <datalist id="subFamilySuggestions"></datalist>
    <datalist id="placeSuggestions"></datalist>

    <div id="contactModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-20">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Add Family Member</h2>
            <input type="hidden" id="editId">
            
            <div class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                
                <div class="flex gap-2">
                    <input type="text" id="family" list="familySuggestions" placeholder="Family Name" class="w-1/2 border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                    <input type="text" id="subFamily" list="subFamilySuggestions" placeholder="Sub Family" class="w-1/2 border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                </div>
                
                <input type="tel" id="phone" placeholder="Phone Number" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                <input type="text" id="place" list="placeSuggestions" placeholder="Place / City" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
            </div>

            <p id="saveStatus" class="text-center text-green-600 mt-4 font-bold hidden">✅ Data Saved!</p>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 bg-gray-200 py-3 rounded-lg font-semibold hover:bg-gray-300">Close</button>
                <button onclick="saveContact()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold shadow-lg hover:bg-blue-700">Save Data</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLWrs7rGUhfRDuD8dPMZdjjCYMSAtPleM",
            authDomain: "family-dairy-192b9.firebaseapp.com",
            projectId: "family-dairy-192b9",
            storageBucket: "family-dairy-192b9.firebasestorage.app",
            messagingSenderId: "1024399308563",
            appId: "1:1024399308563:web:7eda6313a984c5b3facce6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const contactsCol = collection(db, "contacts");

        let allContacts = [];

        onSnapshot(query(contactsCol, orderBy("name")), (snapshot) => {
            allContacts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateSuggestions();
            renderContacts(allContacts);
        });

        // Helper: Capitalize Each Word
        const toTitleCase = (str) => {
            if (!str) return "";
            return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        };

        function updateSuggestions() {
            const getUnique = (field) => [...new Set(allContacts.map(c => c[field]).filter(v => v))];
            const fillList = (id, vals) => document.getElementById(id).innerHTML = vals.map(v => `<option value="${v}">`).join('');
            
            fillList('familySuggestions', getUnique('family'));
            fillList('subFamilySuggestions', getUnique('subFamily'));
            fillList('placeSuggestions', getUnique('place'));
        }

        window.renderContacts = (data) => {
            const container = document.getElementById('contactList');
            container.innerHTML = data.length ? '' : '<div class="text-center py-20 opacity-50">No contacts found.</div>';
            
            data.forEach(c => {
                const cleanPhone = (c.phone || "").replace(/\D/g, '');
                container.innerHTML += `
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-bold text-xl text-gray-900">${c.name}</h3>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">${c.family}</span>
                                <span class="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">${c.subFamily}</span>
                                <span class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded font-bold uppercase">📍 ${c.place}</span>
                            </div>
                            <p class="text-lg font-bold text-gray-700 mt-3">${c.phone}</p>
                        </div>
                        <div class="flex flex-col gap-3">
                             <a href="tel:${c.phone}" class="bg-green-500 p-3 rounded-full text-white shadow-lg flex items-center justify-center">📞</a>
                             
                             <a href="https://wa.me/${cleanPhone}" target="_blank" class="bg-emerald-600 p-3 rounded-full text-white shadow-lg flex items-center justify-center">
                                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.484 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.309 1.656zm6.29-4.143c1.489.881 3.257 1.346 5.061 1.347 5.462 0 9.904-4.441 9.907-9.904 0-2.646-1.03-5.132-2.903-7.005-1.873-1.873-4.359-2.903-7.004-2.903-5.463 0-9.903 4.44-9.907 9.903-.001 1.93.535 3.805 1.547 5.45l-.946 3.454 3.545-.93zm11.367-7.4c-.301-.15-1.781-.879-2.056-.979-.275-.1-.475-.15-.675.15-.199.299-.775.979-.95 1.178-.175.199-.35.224-.65.075-.3-.15-1.268-.467-2.414-1.485-.892-.795-1.493-1.777-1.668-2.076-.175-.299-.019-.461.13-.61.135-.133.301-.35.451-.524.15-.174.199-.299.301-.498.1-.199.05-.374-.025-.524s-.675-1.624-.925-2.228c-.244-.589-.491-.509-.675-.519-.174-.01-.374-.01-.575-.01-.199 0-.524.075-.799.374-.275.299-1.05 1.024-1.05 2.497 0 1.472 1.074 2.894 1.223 3.094.15.199 2.113 3.227 5.12 4.524.714.307 1.272.49 1.707.629.718.227 1.37.195 1.887.118.575-.085 1.781-.724 2.031-1.423.25-.699.25-1.298.175-1.423-.075-.125-.275-.199-.575-.349z"/></svg>
                             </a>

                             <button onclick="editContact('${c.id}')" class="text-blue-600 font-bold text-sm">Edit</button>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t flex justify-end">
                        <button onclick="confirmDelete('${c.id}', '${c.name}')" class="text-red-400 text-xs hover:text-red-600">Remove</button>
                    </div>
                </div>`;
            });
        };

        window.saveContact = async () => {
            const id = document.getElementById('editId').value;
            const data = {
                name: toTitleCase(document.getElementById('name').value),
                family: toTitleCase(document.getElementById('family').value),
                subFamily: toTitleCase(document.getElementById('subFamily').value),
                phone: document.getElementById('phone').value,
                place: toTitleCase(document.getElementById('place').value)
            };

            if(!data.name || !data.phone) return alert("Fill Name and Phone!");
            
            try {
                id ? await updateDoc(doc(db, "contacts", id), data) : await addDoc(contactsCol, data);
                
                const status = document.getElementById('saveStatus');
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 2000);

                if(!id) {
                    ['name', 'family', 'subFamily', 'phone', 'place'].forEach(f => document.getElementById(f).value = "");
                }
            } catch (err) { alert(err.message); }
        };

        window.confirmDelete = async (id, name) => {
            if(confirm(`Delete ${name}?`)) {
                await deleteDoc(doc(db, "contacts", id));
            }
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allContacts.filter(c => 
                (c.name?.toLowerCase() || "").includes(term) || 
                (c.family?.toLowerCase() || "").includes(term) || 
                (c.subFamily?.toLowerCase() || "").includes(term) || 
                (c.place?.toLowerCase() || "").includes(term)
            );
            renderContacts(filtered);
        });

        window.exportToExcel = () => {
            const dataToExport = allContacts.map(({id, ...rest}) => rest);
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Family Contacts");
            XLSX.writeFile(wb, "FamilyDiary_Export.xlsx");
        };

        window.openModal = () => {
            document.getElementById('editId').value = "";
            document.getElementById('modalTitle').innerText = "New Family Member";
            document.getElementById('contactModal').classList.remove('hidden');
        };

        window.editContact = (id) => {
            const c = allContacts.find(x => x.id === id);
            document.getElementById('editId').value = c.id;
            document.getElementById('name').value = c.name;
            document.getElementById('family').value = c.family;
            document.getElementById('subFamily').value = c.subFamily;
            document.getElementById('phone').value = c.phone;
            document.getElementById('place').value = c.place;
            document.getElementById('modalTitle').innerText = "Update Member";
            document.getElementById('contactModal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('contactModal').classList.add('hidden');
            ['name', 'family', 'subFamily', 'phone', 'place'].forEach(f => document.getElementById(f).value = "");
        };
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.error('SW Failed!', err));
            });
        }
    </script>

</body>
</html>
